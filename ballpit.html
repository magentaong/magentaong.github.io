<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Pit</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP & Draggable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <script src="floatingBalls.js" defer></script>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden min-h-[500vh]">
    
    <!-- Navbar -->
    <header class="w-full fixed top-0 bg-black z-10">
        <div class="container mx-auto flex justify-between items-center py-4 px-6">
            <h1 class="text-2xl font-bold text-orange-500">Magenta Ong</h1>
            <nav>
                <ul class="flex space-x-6 text-lg">
                    <li><a href="index.html" class="hover:text-orange-500">Home</a></li>
                    <li><a href="#portfolio" class="hover:text-orange-500">Projects</a></li>
                    <li><a href="ballpit.html" class="hover:text-orange-500">Ball Pit</a></li>
                    <li><a href="#contact" class="hover:text-orange-500">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
    

    
    
    <!-- Ball Pit Container -->
    <div id="ball-container" class="absolute top-0 left-0 w-full h-[500vh] overflow-visible"></div>
    
    <style>
        /* Ensure full-width and extend downward for infinite scrolling */
        .drag-ball {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            mix-blend-mode: difference;
            filter: blur(2px);
            background: white;
        }
    </style>
    
</body>
</html>
